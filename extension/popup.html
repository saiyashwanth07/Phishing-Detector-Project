<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhiUSIIL Phishing Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      width: 380px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
    }

    .header h1 {
      font-size: 20px;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .logo {
      width: 50px;
      height: 50px;
      margin: 0 auto 15px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .content {
      padding: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input[type="url"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    input[type="url"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:active {
      transform: translateY(2px);
    }

    .primary-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .primary-btn:hover {
      opacity: 0.9;
    }

    .secondary-btn {
      background: #f0f0f0;
      color: #333;
    }

    .secondary-btn:hover {
      background: #e0e0e0;
    }

    .danger-btn {
      background: #ff4757;
      color: white;
    }

    .danger-btn:hover {
      background: #ff3742;
    }

    .spinner {
      text-align: center;
      padding: 20px;
      display: none;
    }

    .spinner.visible {
      display: block;
    }

    .spinner::after {
      content: "";
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #ffebee;
      color: #d32f2f;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .result {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      display: none;
      border-left: 4px solid transparent;
    }

    .result.visible {
      display: block;
    }

    .result.danger {
      border-left-color: #ff4757;
      background: #fff5f5;
    }

    .result.warning {
      border-left-color: #ffa502;
      background: #fff9e6;
    }

    .result.safe {
      border-left-color: #2ed573;
      background: #f1f8e9;
    }

    .result h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .result p {
      font-size: 14px;
      line-height: 1.5;
      color: #555;
    }

    .confidence-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      margin: 10px 0;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .confidence-fill.danger {
      background: linear-gradient(90deg, #ff4757, #ff6b81);
    }

    .confidence-fill.warning {
      background: linear-gradient(90deg, #ffa502, #ffb142);
    }

    .confidence-fill.safe {
      background: linear-gradient(90deg, #2ed573, #7bed9f);
    }

    .confidence-text {
      text-align: right;
      font-size: 12px;
      color: #777;
      font-weight: 600;
    }

    .history-section {
      margin-top: 20px;
    }

    .history-section h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #555;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-list {
      background: white;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-item {
      padding: 10px 15px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    .history-item:hover {
      background: #f8f9fa;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-url {
      font-size: 13px;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .history-prediction {
      font-size: 10px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .phishing-badge {
      background: #ff4757;
      color: white;
    }

    .legitimate-badge {
      background: #2ed573;
      color: white;
    }

    .footer {
      text-align: center;
      padding: 15px;
      font-size: 11px;
      color: #777;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🛡️</div>
      <h1>PhiUSIIL Phishing Detector</h1>
      <p>Advanced ML-powered URL analysis</p>
    </div>

    <div class="content">
      <div class="input-group">
        <input type="url" id="urlInput" placeholder="Enter URL to analyze (http:// or https://)">
      </div>

      <div class="button-group">
        <button id="checkBtn" class="primary-btn">
          <span>🔍</span> Check URL
        </button>
        <button id="checkCurrentBtn" class="secondary-btn">
          <span>🌐</span> Current Page
        </button>
      </div>

      <div class="action-buttons">
        <button id="ignoreBtn" class="secondary-btn">
          <span>🙈</span> Ignore Domain
        </button>
        <button id="clearBtn" class="danger-btn">
          <span>🗑️</span> Clear History
        </button>
      </div>

      <div class="spinner" id="loadingSpinner"></div>

      <div class="error-message" id="errorMessage"></div>

      <div class="result" id="resultSection">
        <h3 id="resultTitle"></h3>
        <p id="resultText"></p>
        <div class="confidence-bar">
          <div class="confidence-fill" id="confidenceBar"></div>
        </div>
        <div class="confidence-text" id="confidenceText"></div>
      </div>

      <div class="history-section">
        <h3>
          <span>Recent Checks</span>
          <span style="font-size: 11px; font-weight: normal;">(Last 5)</span>
        </h3>
        <div class="history-list" id="historyList">
          <div class="history-item">No checks yet</div>
        </div>
      </div>
    </div>

    <div class="footer">
      Using machine learning to protect you from phishing attacks
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
